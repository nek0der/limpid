excluded:
  - vendor
  - build
  - .build
  - Limpid.xcodeproj

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length: 1
  excluded:
    - id
    - x
    - y
    - w
    - h
    - r
    - g
    - b

function_body_length:
  warning: 80
  error: 200

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 1000

disabled_rules:
  - todo
  - trailing_comma
  - opening_brace
