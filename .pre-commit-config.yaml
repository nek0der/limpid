# Pre-commit hooks — instant local feedback before a commit lands.
# One-time setup:  brew install pre-commit gitleaks  &&  pre-commit install
# CI re-runs the same gates (.github/workflows/guardrails.yml), so these are a
# convenience layer, not the enforcement boundary.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: forbidden-terms
        name: forbidden terms (competitor names / foreign issue refs)
        entry: scripts/check-forbidden-terms.sh
        language: script
        pass_filenames: false
        always_run: true
