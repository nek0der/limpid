name: Guardrails

# Reputation + secret hygiene gates that run independently of the macOS build
# matrix (ci.yml) so they stay fast and always execute. The same checks run
# locally via .pre-commit-config.yaml.
on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs when a new commit lands on the same ref —
# rapid-fire pushes during a force-push or fix-up burst would
# otherwise queue duplicate runs that all check the same outcome.
concurrency:
  group: guardrails-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # full history so gitleaks scans every commit, not just the tip
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  forbidden-terms:
    name: Forbidden terms (competitor names)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Scan tracked files
        run: scripts/check-forbidden-terms.sh
      - name: Self-test the regex (catches a `\b` regression at edit time)
        run: scripts/test-check-forbidden-terms.sh

  notices-coverage:
    name: Attribution coverage (THIRD-PARTY-NOTICES)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Verify every bundled dependency is acknowledged
        run: scripts/check-notices-coverage.sh
