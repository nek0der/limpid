name: Mark stale issues and PRs

on:
  schedule:
    - cron: '0 4 * * *'   # Daily at 04:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9.1.0
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,needs-triage
          exempt-pr-labels: pinned,security,dependencies
          stale-issue-message: |
            This issue has been inactive for 60 days. It will close in 14 days unless there is new activity. Comment to keep it open.
          stale-pr-message: |
            This PR has been inactive for 30 days. It will close in 14 days unless there is new activity.
          close-issue-message: |
            Closing as stale. Feel free to reopen if this is still relevant.
          close-pr-message: |
            Closing as stale. Feel free to reopen.
