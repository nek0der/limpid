version: 2
updates:
  # GitHub Actions: monthly, no major bumps. Majors tend to introduce
  # breaking changes that need a hand-review (e.g. `actions/cache` v5,
  # `apple-actions/import-codesign-certs` v7) and a release pipeline
  # this small can survive being a release behind.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - github-actions
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  # Submodules: monthly, no auto-updates of any kind. `vendor/ghostty`
  # tracks a fast-moving upstream that frequently breaks our build at
  # the Zig / Metal layer; bumps are vetted manually in a dedicated PR.
  - package-ecosystem: gitsubmodule
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    commit-message:
      prefix: chore
    labels:
      - dependencies
      - submodule
    ignore:
      - dependency-name: "*"
